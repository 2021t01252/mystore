<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MyStore</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f8f6f1; --bg2: #f0ece3; --surface: #ffffff; --border: #e2ddd5;
  --accent: #2d5a3d; --accent2: #1e3f2b; --accent-light: #e8f0ea;
  --gold: #c9a84c; --text: #1a1a18; --muted: #7a7870; --danger: #c0392b;
  --success: #27ae60; --radius: 14px; --shadow: 0 4px 24px rgba(45,90,61,0.10);
  --shadow-lg: 0 12px 48px rgba(45,90,61,0.15);
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:'Outfit',sans-serif;min-height:100vh}

/* NAV */
nav{position:sticky;top:0;z-index:200;background:rgba(248,246,241,0.94);backdrop-filter:blur(16px);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 40px;height:72px;}
.nav-brand{font-family:'Cormorant Garamond',serif;font-size:1.7rem;font-weight:700;color:var(--accent);cursor:pointer;letter-spacing:0.01em;display:flex;align-items:center;gap:8px;}
.nav-brand span{color:var(--gold)}
.nav-right{display:flex;align-items:center;gap:14px}
.cart-btn{background:var(--accent);color:#fff;border:none;padding:10px 22px;border-radius:100px;cursor:pointer;font-family:inherit;font-size:0.88rem;font-weight:500;display:flex;align-items:center;gap:8px;transition:background 0.2s,transform 0.15s;letter-spacing:0.02em;}
.cart-btn:hover{background:var(--accent2);transform:translateY(-1px)}
.cart-count{background:var(--gold);color:#fff;border-radius:100px;font-size:0.72rem;font-weight:700;padding:2px 7px;min-width:20px;text-align:center;}
.nav-admin{color:var(--muted);font-size:0.82rem;cursor:pointer;transition:color 0.15s}
.nav-admin:hover{color:var(--accent)}

/* COMMON UI */
.page{display:none;animation:fadeIn 0.3s ease}
.page.active{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.store-hero{background:linear-gradient(135deg,var(--accent) 0%,var(--accent2) 100%);color:#fff;padding:72px 40px 60px;text-align:center;position:relative;overflow:hidden;}
.search-bar-wrap{max-width:480px;margin:-26px auto 0;position:relative;z-index:10;padding:0 32px;}
.search-bar{width:100%;background:var(--surface);border:1px solid var(--border);padding:14px 20px;border-radius:100px;font-family:inherit;font-size:0.95rem;box-shadow:var(--shadow-lg);outline:none;color:var(--text);transition:border-color 0.2s;}
.products-section{max-width:1320px;margin:0 auto;padding:48px 40px 80px}
.products-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(270px,1fr));gap:28px;}
.product-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;transition:transform 0.25s,box-shadow 0.25s;}
.product-card:hover{transform:translateY(-5px);box-shadow:var(--shadow-lg)}
.product-info{padding:18px 18px 20px}
.product-title{font-weight:600;font-size:0.98rem;line-height:1.3;margin-bottom:5px}
.product-price{color:var(--accent);font-weight:700;font-size:1.15rem;font-family:'Cormorant Garamond',serif}
.add-btn{width:100%;margin-top:14px;background:var(--accent);color:#fff;border:none;padding:11px;border-radius:8px;cursor:pointer;}
.cart-wrap{max-width:820px;margin:0 auto;padding:48px 40px 80px}
.checkout-box{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:28px;margin-top:28px}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.fg{display:flex;flex-direction:column;gap:6px}
.fg.full{grid-column:1/-1}
.fg input,.fg textarea{background:var(--bg);border:1.5px solid var(--border);padding:12px 14px;border-radius:9px;font-family:inherit;}
.submit-btn{width:100%;margin-top:22px;background:var(--accent);color:#fff;border:none;padding:15px;border-radius:10px;font-weight:600;cursor:pointer;}

/* ADMIN PANEL */
.admin-wrap{max-width:1280px;margin:0 auto;padding:44px 40px 80px}
.config-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:36px}
.config-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:24px}
.badge{font-size:0.72rem;padding:3px 9px;border-radius:100px;font-weight:600}
.badge.ok{background:rgba(39,174,96,0.12);color:var(--success)}
.badge.no{background:rgba(192,57,43,0.12);color:var(--danger)}
.btn-sm{background:none;border:1.5px solid var(--border);padding:9px 18px;border-radius:8px;cursor:pointer;font-size:0.85rem;font-weight:500;}
.btn-sm.primary{background:var(--accent);color:#fff;border-color:var(--accent)}
.login-wrap{max-width:420px;margin:80px auto;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:44px 40px;}

/* TOAST */
.toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(90px);background:var(--text);color:var(--bg);padding:12px 22px;border-radius:100px;font-size:0.88rem;z-index:9999;transition:transform 0.3s;pointer-events:none;}
.toast.show{transform:translateX(-50%) translateY(0)}
.toast.ok{background:var(--success)}
.toast.err{background:var(--danger)}

/* LOADER */
.loader{text-align:center;padding:48px;color:var(--muted)}
.spinner{display:inline-block;width:28px;height:28px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 0.7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>

<div class="toast" id="toast"></div>

<nav>
  <div class="nav-brand" onclick="showPage('store')">🌿 <span>MyStore</span></div>
  <div class="nav-right">
    <button class="cart-btn" onclick="showPage('cart')">
      🛒 Cart <span class="cart-count" id="cartCount">0</span>
    </button>
    <span class="nav-admin" onclick="showPage('adminLogin')">Admin ›</span>
  </div>
</nav>

<div class="page active" id="page-store">
  <div class="store-hero">
    <h1 id="heroTitle">Welcome to <em>MyStore</em></h1>
    <p>Fresh products, delivered to your door</p>
  </div>
  <div class="search-bar-wrap">
    <input class="search-bar" type="text" id="searchInput" placeholder="🔍  Search products..." oninput="filterProducts()">
  </div>
  <div class="products-section">
    <div class="products-grid" id="productsGrid">
      <div class="loader"><div class="spinner"></div><br>Loading...</div>
    </div>
  </div>
</div>

<div class="page" id="page-cart">
  <div class="cart-wrap">
    <h2>🛒 Your Cart</h2>
    <div id="cartItems"></div>
    <div id="cartFooter"></div>
  </div>
</div>

<div class="page" id="page-success">
  <div class="success-wrap" style="text-align:center; padding:100px 20px;">
    <h2>✅ Order Received!</h2>
    <p>We'll contact you soon to confirm delivery.</p>
    <button class="btn-sm primary" style="margin-top:20px" onclick="showPage('store');clearCart()">Back to Store</button>
  </div>
</div>

<div class="page" id="page-adminLogin">
  <div class="login-wrap">
    <h2>Admin Login</h2>
    <div class="fg" style="margin-bottom:14px"><label>Username</label><input type="text" id="loginUser"></div>
    <div class="fg" style="margin-bottom:20px"><label>Password</label><input type="password" id="loginPass"></div>
    <button class="submit-btn" onclick="doLogin()">Sign In</button>
  </div>
</div>

<div class="page" id="page-admin">
  <div class="admin-wrap">
    <div class="admin-header" style="display:flex; justify-content:space-between; margin-bottom:30px">
      <h2>⚙ Admin Panel</h2>
      <div>
        <button class="btn-sm" onclick="showPage('store')">View Store</button>
        <button class="btn-sm" onclick="doLogout()">Logout</button>
      </div>
    </div>

    <div class="config-grid">
      <div class="config-card">
        <h3>🗄 Store Identity</h3>
        <div class="fg" style="margin-top:10px"><label>Store Name</label><input type="text" id="cfgStoreName"></div>
        <button class="btn-sm primary" style="margin-top:14px" onclick="saveStoreName()">Update Store Name</button>
      </div>
      <div class="config-card">
        <h3>📧 Email Config <span id="emailStatus" class="badge no">Checking...</span></h3>
        <div class="fg"><label>Service ID</label><input type="text" id="ejSvc"></div>
        <div class="fg"><label>Template ID</label><input type="text" id="ejTpl"></div>
        <div class="fg"><label>Public Key</label><input type="text" id="ejKey"></div>
        <div class="fg"><label>Your Email</label><input type="email" id="ejEmail"></div>
        <button class="btn-sm primary" style="margin-top:14px" onclick="saveEmailCfg()">Save Config</button>
      </div>
    </div>

    <div class="config-card" style="margin-bottom:30px">
      <h3>🔐 Admin Password</h3>
      <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-top:10px">
        <div class="fg"><label>New User</label><input type="text" id="newUser"></div>
        <div class="fg"><label>New Pass</label><input type="password" id="newPass"></div>
      </div>
      <button class="btn-sm primary" style="margin-top:14px" onclick="saveCreds()">Update Login</button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
<script>
// --- CONFIG ---
const SUPABASE_URL  = 'https://otiqxnqjlkncubzdowzg.supabase.co';
const SUPABASE_KEY  = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im90aXF4bnFqbGtuY3ViemRvd3pnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgyMzE3MDgsImV4cCI6MjA5MzgwNzcwOH0.JHs4A9CjYeZLBxoVhV7uuAxDqbnR6I2M8djzmRf_XAk';

const sb = {
  headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}`, 'Content-Type': 'application/json', 'Prefer': 'return=representation' },
  async get(table, query='') {
    const r = await fetch(`${SUPABASE_URL}/rest/v1/${table}?${query}`, { headers: this.headers });
    return r.json();
  },
  async post(table, body) {
    const r = await fetch(`${SUPABASE_URL}/rest/v1/${table}`, { method:'POST', headers: this.headers, body: JSON.stringify(body) });
    return r.json();
  },
  async upsert(table, idValue, body) {
    // Supabase REST upsert via POST + Resolution header
    const r = await fetch(`${SUPABASE_URL}/rest/v1/${table}`, { 
        method:'POST', 
        headers: { ...this.headers, 'Resolution': 'merge-duplicates' }, 
        body: JSON.stringify({id: idValue, value: body}) 
    });
    return r.json();
  }
};

// --- STATE ---
let products = [];
let cart = JSON.parse(localStorage.getItem('cart') || '[]');
let loggedIn = false;
let creds = {u: 'admin', p: 'admin123'};
let emailCfg = {};
let storeName = 'MyStore';

// --- SYNC FROM DB (Crucial for multi-device) ---
async function syncSettings() {
    try {
        const data = await sb.get('store_settings');
        data.forEach(item => {
            if (item.id === 'creds') creds = item.value;
            if (item.id === 'emailCfg') emailCfg = item.value;
            if (item.id === 'storeName') storeName = item.value.name;
        });
        updateGlobalUI();
    } catch(e) { console.error("Sync Error:", e); }
}

function updateGlobalUI() {
    document.title = storeName;
    document.querySelector('.nav-brand span').textContent = storeName;
    document.getElementById('heroTitle').innerHTML = `Welcome to <em>${storeName}</em>`;
    
    // Admin panel updates
    const eOk = !!(emailCfg.svc && emailCfg.tpl && emailCfg.key && emailCfg.email);
    const badge = document.getElementById('emailStatus');
    if(badge) {
        badge.textContent = eOk ? '✓ Configured' : 'Not configured';
        badge.className = eOk ? 'badge ok' : 'badge no';
    }
}

// --- NAVIGATION ---
function showPage(p) {
  document.querySelectorAll('.page').forEach(x => x.classList.remove('active'));
  document.getElementById('page-' + p).classList.add('active');
  window.scrollTo(0,0);
  if (p === 'store') loadProducts();
  if (p === 'cart') renderCart();
  if (p === 'admin') { if(!loggedIn){showPage('adminLogin');} else { syncSettings(); renderAdminInputs(); }}
}

async function loadProducts() {
  const grid = document.getElementById('productsGrid');
  try {
    products = await sb.get('products', 'order=created_at.desc');
    renderProductGrid(products);
  } catch(e) { grid.innerHTML = 'Error loading products.'; }
}

function renderProductGrid(list) {
  const grid = document.getElementById('productsGrid');
  grid.innerHTML = list.map(p => `
    <div class="product-card">
      <div class="product-info">
        <div class="product-title">${p.name}</div>
        <div class="product-price">LKR ${Number(p.price).toLocaleString()}</div>
        <button class="add-btn" onclick="addToCart('${p.id}')">+ Add to Cart</button>
      </div>
    </div>`).join('');
}

// --- CART ---
function addToCart(id) {
  const ex = cart.find(x => x.id === id);
  if (ex) ex.qty++; else cart.push({ id, qty: 1 });
  localStorage.setItem('cart', JSON.stringify(cart));
  updateCount();
  toast('Added to cart ✓', 'ok');
}

function updateCount() {
  document.getElementById('cartCount').textContent = cart.reduce((s,x)=>s+x.qty,0);
}

function clearCart() { cart = []; localStorage.setItem('cart', '[]'); updateCount(); }

// --- ADMIN ACTIONS ---
function doLogin() {
  const u = document.getElementById('loginUser').value;
  const p = document.getElementById('loginPass').value;
  if (u === creds.u && p === creds.p) { loggedIn = true; showPage('admin'); }
  else toast('Invalid login', 'err');
}

function doLogout() { loggedIn = false; showPage('store'); }

function renderAdminInputs() {
    document.getElementById('cfgStoreName').value = storeName;
    document.getElementById('ejSvc').value = emailCfg.svc || '';
    document.getElementById('ejTpl').value = emailCfg.tpl || '';
    document.getElementById('ejKey').value = emailCfg.key || '';
    document.getElementById('ejEmail').value = emailCfg.email || '';
}

async function saveEmailCfg() {
  const cfg = {
    svc: document.getElementById('ejSvc').value.trim(),
    tpl: document.getElementById('ejTpl').value.trim(),
    key: document.getElementById('ejKey').value.trim(),
    email: document.getElementById('ejEmail').value.trim()
  };
  await sb.upsert('store_settings', 'emailCfg', cfg);
  emailCfg = cfg;
  syncSettings();
  toast('Email Config Saved Globally ✓', 'ok');
}

async function saveCreds() {
  const u = document.getElementById('newUser').value.trim();
  const p = document.getElementById('newPass').value.trim();
  if(!u || !p) return toast('Fields required', 'err');
  const newCreds = {u, p};
  await sb.upsert('store_settings', 'creds', newCreds);
  creds = newCreds;
  toast('Credentials Updated Globally ✓', 'ok');
}

async function saveStoreName() {
  const name = document.getElementById('cfgStoreName').value.trim();
  await sb.upsert('store_settings', 'storeName', {name});
  storeName = name;
  syncSettings();
  toast('Store Name Updated Globally ✓', 'ok');
}

// --- TOAST ---
function toast(msg, type='') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'toast show ' + type;
  setTimeout(()=>el.className='toast', 3000);
}

// INIT
syncSettings();
updateCount();
loadProducts();
</script>
</body>
</html>
